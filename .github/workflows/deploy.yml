name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: suhang_kim/frontend/package-lock.json

      - name: Install dependencies
        working-directory: suhang_kim/frontend
        run: npm ci

      - name: Build
        working-directory: suhang_kim/frontend
        env:
          VITE_BASE_PATH: A-algorithm
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_TMAP_APP_KEY: ${{ secrets.VITE_TMAP_APP_KEY }}
          VITE_SHEET_URL: ${{ secrets.VITE_SHEET_URL }}
        run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: suhang_kim/frontend/dist

      - uses: actions/deploy-pages@v4
        id: deployment
