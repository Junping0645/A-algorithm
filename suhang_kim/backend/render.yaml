services:
  - type: web
    name: ambulance-pathfinding-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: suhang_kim/backend
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
